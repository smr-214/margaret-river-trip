<head>

<style>
:root{
  --bg:#faf6ee; --paper:#fffdf9; --ink:#2b2620; --muted:#7c7368; --line:#e7ddcd;
  --green:#1f5e3a; --green2:#2e7d52; --teal:#1f7a8c; --plum:#7d4f6d; --terra:#b5613f;
  --gold:#c89b3c; --shadow:0 2px 10px rgba(60,45,25,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.55;}
a{color:var(--teal);}

/* HEADER */
.hero{
  background:linear-gradient(135deg,#16432a 0%,#1f5e3a 45%,#1f7a8c 100%);
  color:#fff;padding:40px 20px 34px;text-align:center;position:relative;overflow:hidden;
}
.hero::after{content:"🌊";position:absolute;right:-10px;bottom:-18px;font-size:7rem;opacity:0.12;}
.hero::before{content:"🍇";position:absolute;left:-6px;top:-14px;font-size:6rem;opacity:0.12;}
.hero .kicker{letter-spacing:3px;text-transform:uppercase;font-size:0.72rem;opacity:0.85;}
.hero h1{font-size:2.05rem;font-weight:900;letter-spacing:-0.5px;margin:6px 0 4px;position:relative;}
.hero .dates{font-size:0.95rem;opacity:0.95;}
.hero .sub{margin-top:10px;font-size:0.82rem;opacity:0.85;}

/* NAV */
.nav{position:sticky;top:0;z-index:20;background:var(--paper);border-bottom:1px solid var(--line);
  display:flex;overflow-x:auto;scrollbar-width:none;box-shadow:var(--shadow);}
.nav::-webkit-scrollbar{display:none;}
.nav button{flex:0 0 auto;border:none;background:none;padding:12px 14px;font-size:0.82rem;font-weight:700;
  color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
.nav button.active{color:var(--green);border-bottom-color:var(--green);}
.nav button .d{display:block;font-size:0.62rem;font-weight:600;color:var(--muted);letter-spacing:0.5px;}
.nav button.active .d{color:var(--green2);}

.wrap{max-width:840px;margin:0 auto;padding:22px 16px 60px;}
.pane{display:none;}
.pane.active{display:block;animation:fade .25s ease;}
@keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

/* DAY HEADER */
.dayhead{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:18px 18px 16px;
  margin-bottom:16px;box-shadow:var(--shadow);border-left:5px solid var(--green);}
.dayhead .tag{font-size:0.7rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--green2);font-weight:700;}
.dayhead h2{font-size:1.4rem;margin:3px 0 6px;}
.dayhead p{color:var(--muted);font-size:0.9rem;}
.daymeta{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
.chip{font-size:0.72rem;background:#f0ead d;background:#f1ead9;border:1px solid var(--line);border-radius:20px;
  padding:4px 10px;color:var(--ink);}
.chip b{color:var(--green);}

/* TIMELINE */
.item{background:var(--paper);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;
  box-shadow:var(--shadow);overflow:hidden;}
.item-head{display:flex;gap:12px;align-items:flex-start;padding:14px 16px;cursor:pointer;}
.item-ic{font-size:1.5rem;flex:0 0 auto;line-height:1.2;}
.item-main{flex:1;min-width:0;}
.item-time{font-size:0.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--terra);font-weight:700;}
.item-title{font-weight:700;font-size:1rem;margin:1px 0 3px;}
.item-blurb{color:var(--muted);font-size:0.86rem;}
.item-flags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.flag{font-size:0.68rem;border-radius:6px;padding:2px 7px;font-weight:600;}
.flag.drive{background:#e8f0ea;color:var(--green);}
.flag.cost{background:#fdf0e8;color:var(--terra);}
.flag.book{background:#fbeaf2;color:var(--plum);}
.flag.time{background:#e7f1f3;color:var(--teal);}
.chev{flex:0 0 auto;color:var(--muted);transition:transform .2s;font-size:0.8rem;margin-top:4px;}
.item.open .chev{transform:rotate(90deg);}
.item-detail{display:none;padding:0 16px 16px 56px;}
.item.open .item-detail{display:block;}
.item-detail p{font-size:0.86rem;margin-bottom:8px;}
.item-detail .why{background:#f4f0e6;border-left:3px solid var(--green2);border-radius:0 8px 8px 0;
  padding:8px 12px;font-size:0.84rem;color:#4a4338;}
.maplink{display:inline-flex;align-items:center;gap:5px;font-size:0.8rem;font-weight:600;text-decoration:none;
  margin-top:6px;}

/* GENERIC CARDS / OVERVIEW & ESSENTIALS */
.card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow);}
.card h3{font-size:1.1rem;color:var(--green);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.card h4{font-size:0.95rem;margin:12px 0 4px;color:var(--plum);}
.card p{font-size:0.9rem;margin-bottom:9px;}
.card ul{margin:0 0 9px 20px;font-size:0.89rem;}
.card li{margin-bottom:5px;}
.tiers{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:6px;}
.tier{border:1px solid var(--line);border-radius:12px;padding:14px;background:#fffefb;}
.tier .lvl{font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;font-weight:800;}
.tier.lux .lvl{color:var(--gold);} .tier.mid .lvl{color:var(--teal);} .tier.val .lvl{color:var(--green2);}
.tier h5{font-size:0.95rem;margin:4px 0 6px;}
.tier ul{margin-left:16px;font-size:0.82rem;}
.geostrip{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:0.8rem;color:var(--muted);margin:8px 0;}
.geostrip span{background:#eef3ee;border-radius:6px;padding:3px 8px;color:var(--green);font-weight:600;}

/* CHECKLIST */
.check{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);font-size:0.88rem;cursor:pointer;}
.check:last-child{border-bottom:none;}
.check input{margin-top:3px;width:17px;height:17px;accent-color:var(--green);flex:0 0 auto;}
.check.done span{text-decoration:line-through;color:var(--muted);}
.reset{font-size:0.74rem;color:var(--muted);background:none;border:1px solid var(--line);border-radius:8px;padding:5px 10px;cursor:pointer;margin-top:10px;}

.callout{background:linear-gradient(135deg,#fff7e6,#fdeee0);border:1px solid #f0dcc0;border-radius:12px;padding:14px 16px;margin-bottom:14px;font-size:0.88rem;}
.callout b{color:var(--terra);}
.note{font-size:0.8rem;color:var(--muted);font-style:italic;}
.foot{text-align:center;color:var(--muted);font-size:0.76rem;padding:24px 16px;}
@media(max-width:560px){ .hero h1{font-size:1.7rem;} .item-detail{padding-left:16px;} }
</style>
</head>

    <p>You're open to suggestions. A simple plan: base centrally for most nights, with a <b>splurge</b> for a night or two. The whole region is close, so one base works well.</p>
    <div class="tiers">
      <div class="tier lux"><div class="lvl">Splurge stay</div><h5>Cape Lodge / Injidup Spa Retreat</h5><ul><li>Cape Lodge — lake views, top restaurant, the region's best stay</li><li>Injidup Spa Retreat — adults-only ocean-view villas with plunge pools</li><li>Pullman Bunker Bay Resort — beachfront</li></ul></div>
      <div class="tier mid"><div class="lvl">Comfortable base</div><h5>Margaret River / Wilyabrup</h5><ul><li>Burnside Organic Farm — private bungalows on a farm (lovely)</li><li>The Sebel / Stay Margaret River</li><li>Forest Rise chalets — fireplaces in the trees</li></ul></div>
      <div class="tier val"><div class="lvl">Value</div><h5>Cottages & town</h5><ul><li>Self-contained cottages around Cowaramup</li><li>Margaret River Hotel / motels in town</li><li>Holiday-home rentals (kitchen = picnic supplies)</li></ul></div>
    </div>
    <p class="note">Recommended: ~4 nights at a comfortable central base + a 1–2 night splurge (Cape Lodge or Injidup) — pick something with room for three. Want me to lock a specific plan? Tell me your nightly budget and I'll pick.</p>
  </div>

  <div class="card">
    <h3>🗺️ The shape of the trip</h3>
    <ul>
      <li><b>Day 1</b> — Arrive Perth, drive south, walk the Busselton Jetty</li>
      <li><b>Day 2</b> — Cape to Cape clifftop hiking (Sugarloaf Rock, Meelup)</li>
      <li><b>Day 3</b> — Cycle the rail-trail + one relaxed winery lunch</li>
      <li><b>Day 4</b> — Karri forest walking &amp; Lake Cave (the one cave)</li>
      <li><b>Day 5</b> — Augusta, Cape Leeuwin &amp; whales 🥂 <i>celebration dinner</i></li>
      <li><b>Day 6</b> — Surf or kayak, rivermouth walk &amp; spa afternoon</li>
      <li><b>Day 7</b> — Final walk, drive back to Perth</li>
    </ul>
    <p class="note">Tap any day in the menu above to expand its full plan. Tap an activity card to reveal tips &amp; a map link.</p>
  </div>`;
}

function essentialsHTML(){
  return `
  <div class="card">
    <h3>🧭 Getting there & around</h3>
    <ul>
      <li><b>Flights:</b> Singapore → Perth is ~5 hrs. <span class="note">Send me your exact 11 &amp; 17 July times and I'll fine-tune Days 1 &amp; 7.</span></li>
      <li><b>Car:</b> self-drive from Perth Airport — essential here. Book an automatic; consider full insurance for gravel roads (e.g. Boranup Drive).</li>
      <li><b>Drive:</b> Perth → Margaret River ≈ 2.5–3 hrs. Within the region, hops are 10–45 min.</li>
      <li><b>Designated driver:</b> with three of you, rotate who drives on tasting days so everyone gets a turn at the cellar door.</li>
    </ul>
  </div>

  <div class="card">
    <h3>🧥 Winter weather & what to pack</h3>
    <p>Expect <b>cool, changeable days (~8–17°C)</b>, showers, and a brisk coastal wind — plus the year's most dramatic surf. Dress in layers.</p>
    <div id="packing"></div>
    <button class="reset" data-reset="packing">Reset packing list</button>
  </div>

  <div class="card">
    <h3>📞 Book these ahead</h3>
    <p class="note">Winter is quieter, but the best tables, the whale cruise and guided caves still fill — especially around the celebration dinner night.</p>
    <div id="booking"></div>
    <button class="reset" data-reset="booking">Reset booking list</button>
  </div>

  <div class="card">
    <h3>💸 Rough budget (AUD, total trip)</h3>
    <p class="note">Indicative only — "mixed" budget with a couple of splurges. 6 nights / 7 days. Figures below assume two sharing costs; adjust once accommodation is booked for three.</p>
    <ul>
      <li><b>Car hire + fuel:</b> ~$450–650</li>
      <li><b>Accommodation:</b> ~$1,300–2,600 (value base + 1–2 splurge nights)</li>
      <li><b>Food &amp; wine:</b> ~$900–1,500 (mix of cafés, cellar doors &amp; two special dinners)</li>
      <li><b>Activities</b> (whale cruise, caves, lighthouses, spa): ~$500–800</li>
      <li><b>Indicative total:</b> ~$3,200–5,500 + flights</li>
    </ul>
  </div>

  <div class="card">
    <h3>💡 Good to know</h3>
    <ul>
      <li>Currency is AUD; tap-to-pay is near-universal. Tipping is not expected.</li>
      <li>Mobile coverage drops out in forest &amp; cave areas — download maps offline.</li>
      <li>Whale cruises run weather-dependent; build a flexible backup (caves/cellar doors) into Day 5.</li>
      <li>Seasickness tablets for the cruise; windproof + waterproof jacket for capes.</li>
      <li>Daylight is short in July (~7am–5:30pm) — front-load outdoor stops.</li>

const PACKING = [
  'Waterproof / windproof jacket','Warm layers (fleece, jumper)','Long trousers & a couple of warmer tops',
  'Sturdy waterproof hiking shoes (lots of walking)','Activewear / quick-dry layers for hikes & cycling','Smart-casual outfit for the celebration dinner','Beanie, scarf & gloves for the capes',
  'Swimwear & towel (surf lesson / spa)','Sunglasses (winter glare is real)','Reusable water bottle & travel mug',
  'Seasickness tablets for the whale cruise','Daypack for walks','Camera / phone + car charger',
  'Insulated flask for hot drinks on the coast','Power adapter (AU Type I)','Cooler bag for cheese, chocolate & wine souvenirs'
];
const BOOKING = [
  'Rental car (automatic, Perth Airport)','Accommodation — incl. splurge night','Augusta whale-watching cruise (Day 5)',
  'Celebration dinner (Cape Lodge / Leeuwin / Arimia)','Miki\'s Open Kitchen (Day 3 — books out)','Lake Cave guided tour (Day 4)',
  'Bike hire for the Wadandi Track (Day 3)','Surf lesson or kayak hire (Day 6)','Spa treatment (Day 6)','Vasse Felix winery lunch (Day 3)'
];

// ════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════
const wrap = document.getElementById('nav');
const TABS = [{id:'overview',label:'Overview',d:'Start here'},
  ...DAYS.map(d=>({id:'day'+d.n,label:'Day '+d.n,d:d.date})),
  {id:'essentials',label:'Essentials',d:'Pack & book'}];

document.getElementById('nav').innerHTML = TABS.map((t,i)=>
  `<button data-tab="${t.id}" class="${i===0?'active':''}"><span>${t.label}</span><span class="d">${t.d}</span></button>`).join('');

function paneHTML(id){
  if(id==='overview') return overviewHTML();
  if(id==='essentials') return essentialsHTML();
  const d = DAYS.find(x=>'day'+x.n===id);
  return `
    <div class="dayhead">
      <div class="tag">Day ${d.n} · ${d.dow} ${d.date}</div>
      <h2>${d.title}</h2>
      <p>${d.theme}</p>
      <div class="daymeta">${d.meta.map(m=>`<span class="chip">${m}</span>`).join('')}</div>
    </div>
    ${d.items.map((it,idx)=>`
      <div class="item" data-item="${d.n}-${idx}">
        <div class="item-head">
          <div class="item-ic">${it.ic}</div>
          <div class="item-main">
            <div class="item-time">${it.t}</div>
            <div class="item-title">${it.title}</div>
            <div class="item-blurb">${it.blurb}</div>
            ${it.flags&&it.flags.length?`<div class="item-flags">${it.flags.map(f=>{const[k,...r]=f.split(':');const v=r.join(':');return v?`<span class="flag ${k}">${v}</span>`:`<span class="flag time">${k}</span>`;}).join('')}</div>`:''}
          </div>
          <div class="chev">▶</div>
        </div>
        <div class="item-detail">
          <div class="why">💡 ${it.why}</div>
          ${it.mapq?`<a class="maplink" href="${map(it.mapq)}" target="_blank" rel="noopener">📍 Open in Google Maps →</a>`:''}
        </div>
      </div>`).join('')}`;
}

function show(id){
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
  document.getElementById('wrap').innerHTML = `<div class="pane active">${paneHTML(id)}</div>`;
  window.scrollTo({top:0,behavior:'smooth'});
  if(id==='essentials'){ renderChecklist('packing',PACKING); renderChecklist('booking',BOOKING); }
}

// expand/collapse activity cards
document.getElementById('wrap').addEventListener('click', e=>{
  const head = e.target.closest('.item-head');
  if(head && !e.target.closest('a')){ head.parentElement.classList.toggle('open'); }
  const reset = e.target.closest('[data-reset]');
  if(reset){ const key=reset.dataset.reset; localStorage.removeItem('mr-'+key); show('essentials'); }
});

// checklists with localStorage
function renderChecklist(key, items){
  const saved = JSON.parse(localStorage.getItem('mr-'+key) || '[]');
  const el = document.getElementById(key);
  el.innerHTML = items.map((t,i)=>`
    <label class="check ${saved.includes(i)?'done':''}">
      <input type="checkbox" data-key="${key}" data-i="${i}" ${saved.includes(i)?'checked':''}>
      <span>${t}</span>
    </label>`).join('');
  el.querySelectorAll('input').forEach(inp=>inp.addEventListener('change',()=>{
    const cur = JSON.parse(localStorage.getItem('mr-'+key) || '[]');
    const i = +inp.dataset.i;
    const next = inp.checked ? [...new Set([...cur,i])] : cur.filter(x=>x!==i);
    localStorage.setItem('mr-'+key, JSON.stringify(next));
    inp.closest('.check').classList.toggle('done',inp.checked);
  }));
}

document.getElementById('nav').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(b) show(b.dataset.tab);
});

document.getElementById('foot').innerHTML = 'Crafted for Perth Pals in Margaret River · 11–17 July 2026 · tap days to explore, activities to expand';
show('overview');
</script>
